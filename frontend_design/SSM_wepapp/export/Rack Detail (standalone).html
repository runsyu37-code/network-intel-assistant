  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

f3f8;\n    --ink-2:     #b3bbcc;\n    --ink-3:     #7c8499;\n    --ink-4:     #4d556a;\n    /* accent (primary) */\n    --accent:    #5b8def;\n    --accent-2:  #7aa2ff;\n    --accent-soft:rgba(91,141,239,.14);\n    /* status — tuned for dark bg */\n    --ok:        #34d399;\n    --ok-soft:   rgba(52,211,153,.14);\n    --warn:      #fbbf24;\n    --warn-soft: rgba(251,191,36,.14);\n    --alert:     #f87171;\n    --alert-soft:rgba(248,113,113,.14);\n    /* edges + grid (theme-aware) */\n    --edge-stroke: #3a4258;\n    --grid-dot:    rgba(255,255,255,.06);\n    --grid-size:   24px;\n    --canvas-bg:   var(--surface);\n    --ring-soft:   rgba(255,255,255,.04);\n    /* shadows — darker, deeper */\n    --shadow-1:  0 1px 2px rgba(0,0,0,.4), 0 0 0 1px rgba(255,255,255,.03);\n    --shadow-2:  0 1px 2px rgba(0,0,0,.4), 0 6px 18px rgba(0,0,0,.45);\n    --shadow-3:  0 2px 6px rgba(0,0,0,.5), 0 18px 40px rgba(0,0,0,.55);\n  }\n\n  :root[data-theme=\"light\"]{\n    /* surfaces */\n    --bg:        #f7f8fa;\n    --surface:   #ffffff;\n    --surface-2: #f3f5f8;\n    --surface-3: #eceff3;\n    /* borders */\n    --border:    #e6e8ec;\n    --border-2:  #d4d7dc;\n    /* ink */\n    --ink:       #0f172a;\n    --ink-2:     #475569;\n    --ink-3:     #94a3b8;\n    --ink-4:     #cbd2db;\n    /* accent */\n    --accent:    #2563eb;\n    --accent-2:  #1d4ed8;\n    --accent-soft:#eff6ff;\n    /* status — tuned for light bg */\n    --ok:        #16a34a;\n    --ok-soft:   #ecfdf5;\n    --warn:      #d97706;\n    --warn-soft: #fffbeb;\n    --alert:     #dc2626;\n    --alert-soft:#fef2f2;\n    /* edges + grid */\n    --edge-stroke: #cbd2db;\n    --grid-dot:    #d0d5dd;\n    --grid-size:   24px;\n    --canvas-bg:   #f0f2f5;\n    --ring-soft:   rgba(15,23,42,.04);\n    /* shadows */\n    --shadow-1:  0 1px 2px rgba(15,23,42,.04), 0 0 0 1px rgba(15,23,42,.02);\n    --shadow-2:  0 2px 8px rgba(15,23,42,.08);\n    --shadow-3:  0 6px 18px rgba(15,23,42,.12), 0 2px 6px rgba(15,23,42,.06);\n  }\n  *{box-sizing:border-box}\n  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);\n    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;\n    font-size:13px;line-height:1.45;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}\n  .mono{font-family:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace;font-feature-settings:\"calt\" 0}\n  button{font:inherit;color:inherit;border:0;background:none;cursor:pointer}\n\n  /* shell */\n  .app{display:grid;grid-template-columns:256px 1fr;height:100vh;min-height:640px}\n\n  /* ============== SIDEBAR ============== */\n  .sidebar{\n    background:var(--surface);\n    border-right:1px solid var(--border);\n    display:flex;flex-direction:column;\n    padding:16px 12px 12px;gap:18px;\n  }\n  .brand{display:flex;align-items:center;gap:10px;padding:4px 6px 14px;border-bottom:1px solid var(--border)}\n  .brand .logo{\n    width:32px;height:32px;border-radius:8px;\n    background:var(--accent);color:#0b0e16;display:grid;place-items:center;\n    font-weight:700;font-size:14px;letter-spacing:.02em\n  }\n  .brand .name{font-weight:600;font-size:14px;letter-spacing:-.005em;color:var(--ink)}\n  .brand .ver{color:var(--ink-3);font-size:11px;margin-top:1px}\n\n  .nav-section{display:flex;flex-direction:column;gap:2px}\n  .nav-section .label{\n    text-transform:uppercase;font-size:10px;letter-spacing:.1em;font-weight:600;\n    color:var(--ink-3);padding:0 8px;margin:6px 0 6px\n  }\n  .nav-item{\n    display:flex;align-items:center;gap:10px;\n    padding:8px 10px;border-radius:7px;color:var(--ink-2);cursor:pointer;\n    font-weight:500;\n  }\n  .nav-item:hover{background:var(--surface-2);color:var(--ink)}\n  .nav-item.active{background:var(--accent-soft);color:var(--accent-2);font-weight:600}\n  .nav-item .ico{width:18px;height:18px;flex:none;color:currentColor;opacity:.9}\n  .nav-item .count{\n    margin-left:auto;font-size:11px;color:var(--ink-3);font-weight:500;\n    background:var(--surface-2);padding:1px 7px;border-radius:999px\n  }\n  .nav-item.active .count{background:rgba(91,141,239,.18);color:var(--accent-2)}\n\n  .tree{display:flex;flex-direction:column;gap:1px;padding:2px 0 0 4px;margin-left:8px;\n    border-left:1px solid var(--border)}\n  .tree .leaf{\n    display:flex;align-items:center;gap:10px;\n    padding:6px 10px;border-radius:6px;color:var(--ink-2);cursor:pointer;font-size:13px\n  }\n  .tree .leaf:hover{background:var(--surface-2);color:var(--ink)}\n  .tree .leaf.active{background:var(--accent-soft);color:var(--accent-2);font-weight:600}\n  .tree .leaf .dot{width:8px;height:8px;border-radius:50%;flex:none;margin-left:auto;\n    box-shadow:0 0 0 3px var(--ring-soft)}\n  .dot.r{background:var(--alert)} .dot.g{background:var(--ok)} .dot.y{background:var(--warn)}\n\n  .add-row{\n    display:flex;align-items:center;gap:10px;\n    padding:7px 10px;border:1px dashed var(--border-2);border-radius:7px;\n    color:var(--ink-2);cursor:pointer;margin:6px 0 0;font-weight:500\n  }\n  .add-row:hover{color:var(--accent);border-color:var(--accent)}\n  .add-row .plus{\n    width:16px;height:16px;border-radius:50%;background:var(--surface-2);\n    display:grid;place-items:center;font-size:13px;line-height:1;color:var(--ink-2)\n  }\n\n  .sidebar .spacer{flex:1}\n  .sidebar-foot{display:flex;flex-direction:column;gap:10px;padding-top:12px;border-top:1px solid var(--border)}\n  .theme-toggle{\n    display:flex;background:var(--surface-2);border-radius:8px;padding:3px;font-size:12px;border:1px solid var(--border)\n  }\n  .theme-toggle button{\n    flex:1;padding:6px 10px;border-radius:6px;color:var(--ink-3);font-weight:500;\n    display:flex;align-items:center;justify-content:center;gap:6px\n  }\n  .theme-toggle button.on{background:var(--surface-3);color:var(--ink);box-shadow:inset 0 0 0 1px var(--border-2);font-weight:600}\n  .user-chip{\n    display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;\n    background:var(--surface-2)\n  }\n  .user-chip:hover{background:var(--surface-3)}\n  .user-chip .avatar{\n    width:30px;height:30px;border-radius:50%;background:var(--accent);color:#0b0e16;\n    display:grid;place-items:center;font-weight:700;font-size:11px;letter-spacing:.02em\n  }\n  .user-chip .who{display:flex;flex-direction:column;line-height:1.2;min-width:0}\n  .user-chip .name{font-weight:600;color:var(--ink);font-size:13px}\n  .user-chip .role{font-size:10px;color:var(--ink-3);text-transform:uppercase;letter-spacing:.1em;font-weight:600}\n  .user-chip .caret{margin-left:auto;color:var(--ink-3)}\n\n  /* ============== MAIN ============== */\n  .main{display:flex;flex-direction:column;min-width:0;background:var(--bg)}\n\n  .topbar{\n    display:flex;align-items:center;gap:14px;\n    padding:11px 24px;border-bottom:1px solid var(--border);\n    background:var(--surface);min-height:56px\n  }\n  .crumbs{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-3)}\n  .crumbs a{color:var(--ink-2);text-decoration:none;font-weight:500}\n  .crumbs a:hover{color:var(--ink)}\n  .crumbs .here{color:var(--ink);font-weight:600}\n  .crumbs .sep{color:var(--ink-4)}\n  .topbar .right{margin-left:auto;display:flex;align-items:center;gap:8px}\n  .pill{\n    display:inline-flex;align-items:center;gap:6px;\n    padding:5px 10px;border:1px solid var(--border);border-radius:999px;\n    color:var(--ink-2);font-size:12px;background:var(--surface);font-weight:500\n  }\n  .pill .dot-i{width:7px;height:7px;border-radius:50%;display:inline-block}\n  .pill.alert{border-color:rgba(248,113,113,.35);background:var(--alert-soft);color:var(--alert);font-weight:600}\n  .pill.alert .dot-i{background:var(--alert);box-shadow:0 0 0 3px rgba(248,113,113,.18)}\n  .pill.poll{color:var(--ink-2)}\n  .pill.poll .dot-i{background:var(--ok)}\n  .icon-btn{\n    width:34px;height:34px;border-radius:8px;\n    display:grid;place-items:center;color:var(--ink-2);\n    background:var(--surface);border:1px solid var(--border)\n  }\n  .icon-btn:hover{background:var(--surface-2);color:var(--ink)}\n  .icon-btn svg{width:16px;height:16px}\n\n  /* page header */\n  .page-head{\n    display:flex;align-items:flex-end;justify-content:space-between;gap:24px;\n    padding:22px 24px 14px\n  }\n  .page-head h1{margin:0;font-size:22px;font-weight:600;letter-spacing:-.015em;color:var(--ink)}\n  .page-head .sub{color:var(--ink-3);font-size:13px;margin-top:4px;max-width:60ch}\n  .legend{display:flex;align-items:center;gap:18px;color:var(--ink-2);font-size:12px;flex-wrap:wrap;justify-content:flex-end}\n  .legend .swatch{display:inline-flex;align-items:center;gap:7px;font-weight:500}\n  .legend .swatch i{width:8px;height:8px;border-radius:50%;display:inline-block;\n    box-shadow:0 0 0 3px rgba(15,23,42,.04)}\n  .legend .line-swatch{display:inline-flex;align-items:center;gap:7px;font-weight:500}\n  .legend .line-swatch i{width:22px;height:0;border-top:1.5px solid var(--ink-2);display:inline-block}\n  .legend .line-swatch.dashed i{border-top-style:dashed}\n\n  /* canvas */\n  .canvas-wrap{flex:1;min-height:0;display:flex;flex-direction:column;padding:4px 24px 24px}\n  .canvas{\n    flex:1;min-height:0;position:relative;\n    background:var(--canvas-bg);\n    border:1px solid var(--border);\n    border-radius:12px;overflow:hidden;\n    background-image:radial-gradient(circle, var(--grid-dot) 1px, transparent 1.2px);\n    background-size:var(--grid-size) var(--grid-size);background-position:0 0;\n    box-shadow:var(--shadow-1)\n  }\n\n  /* canvas toolbar */\n  .canvas-tools{\n    position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:3\n  }\n  .canvas-tools .group{\n    display:flex;flex-direction:column;background:var(--surface);\n    border:1px solid var(--border);border-radius:8px;overflow:hidden;\n    box-shadow:var(--shadow-1)\n  }\n  .canvas-tools .group .icon-btn{background:transparent;border:0;border-radius:0;border-bottom:1px solid var(--border)}\n  .canvas-tools .group .icon-btn:last-child{border-bottom:0}\n  .canvas-tools > .icon-btn{box-shadow:var(--shadow-1)}\n\n  /* minimap */\n  .minimap{\n    position:absolute;left:14px;bottom:14px;\n    width:172px;height:104px;\n    background:var(--surface);border:1px solid var(--border);border-radius:8px;\n    overflow:hidden;z-index:3;box-shadow:var(--shadow-1)\n  }\n  .minimap .label{\n    position:absolute;left:8px;top:6px;font-size:10px;color:var(--ink-3);\n    font-weight:600;letter-spacing:.08em;text-transform:uppercase;z-index:2\n  }\n  .minimap .viewport{\n    position:absolute;left:30%;top:28%;width:50%;height:52%;\n    border:1.5px solid var(--accent);border-radius:3px;\n    background:rgba(91,141,239,.10)\n  }\n  .minimap .nub{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--ink-3)}\n  .minimap .nub.r{background:var(--alert)}\n  .minimap .nub.y{background:var(--warn)}\n  .minimap .nub.hq{background:var(--accent);width:8px;height:8px}\n\n  /* edges */\n  svg.edges{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}\n  .edge{fill:none;stroke:var(--edge-stroke);stroke-width:1.5;stroke-linecap:round}\n  .edge.alert{stroke:var(--alert);stroke-width:2}\n  .edge.vpn{stroke:var(--edge-stroke);stroke-dasharray:5 5}\n  .edge-label{\n    font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10px;fill:var(--ink-3);font-weight:500\n  }\n\n  /* nodes */\n  .node{\n    position:absolute;transform:translate(-50%,-50%);\n    background:var(--surface);\n    border:1px solid var(--border);\n    border-radius:10px;\n    padding:13px 15px;\n    min-width:216px;\n    display:flex;align-items:center;gap:12px;\n    z-index:2;cursor:pointer;user-select:none;\n    box-shadow:var(--shadow-2);\n    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;\n  }\n  :root[data-theme=\"light\"] .node{ border-color:#d4d7dc; }\n  .node:hover{transform:translate(-50%,-50%) translateY(-1px);box-shadow:var(--shadow-3);border-color:var(--border-2)}\n  .node .dot{width:10px;height:10px;border-radius:50%;flex:none;box-shadow:0 0 0 3px var(--ring-soft)}\n  .node .meta{display:flex;flex-direction:column;gap:1px;min-width:0;flex:1}\n  .node .title{font-weight:600;font-size:13px;color:var(--ink);letter-spacing:-.005em;line-height:1.25;white-space:nowrap}\n  .node .sub{font-size:11.5px;color:var(--ink-3);font-weight:500}\n  .node .count{font-size:11px;color:var(--ink-2);font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:500;\n    background:var(--surface-2);padding:3px 8px;border-radius:999px;flex:none}\n\n  /* HQ node — accent primary */\n  .node.hq{\n    background:linear-gradient(180deg, #1b2540 0%, #141a2c 100%);\n    color:#fff;border-color:rgba(91,141,239,.45);\n    min-width:220px;padding:14px 16px;gap:12px;\n    display:flex;flex-direction:column;align-items:stretch;\n    box-shadow:0 0 0 1px rgba(91,141,239,.18), 0 8px 28px rgba(0,0,0,.55), 0 0 32px rgba(91,141,239,.18)\n  }\n  .node.hq:hover{transform:translate(-50%,-50%) translateY(-1px)}\n  .node.hq .head{display:flex;align-items:center;gap:10px}\n  .node.hq .glyph{\n    width:32px;height:32px;border-radius:8px;background:var(--accent);color:#0b0e16;\n    display:grid;place-items:center;font-weight:700;font-size:13px;flex:none\n  }\n  .node.hq .title{color:#fff;font-size:14px;white-space:normal}\n  .node.hq .ip{color:#94a3b8;font-size:11.5px;margin-top:2px;font-family:'JetBrains Mono',ui-monospace,monospace}\n  .node.hq .stat{\n    display:flex;align-items:center;gap:8px;font-size:12px;color:#cbd5e1;\n    padding:8px 0 0;border-top:1px solid rgba(255,255,255,.08);font-weight:500\n  }\n  .node.hq .stat .dot{width:7px;height:7px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(255,255,255,.05);background:var(--ok)}\n  .node.hq .stat .count{margin-left:auto;color:#94a3b8;background:transparent;padding:0}\n\n  /* status-tinted left border + dot color */\n  .node.alert{border-color:rgba(248,113,113,.4)}\n  .node.warn{border-color:rgba(251,191,36,.35)}\n  .node.ok{border-color:var(--border)}\n  .node.alert::before,\n  .node.warn::before,\n  .node.ok::before{\n    content:\"\";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:3px;\n  }\n  .node.alert::before{background:var(--alert)}\n  .node.warn::before {background:var(--warn)}\n  .node.ok::before   {background:var(--ok)}\n\n  /* subtle pulse on the offline node’s dot */\n  @keyframes pulseDot{\n    0%{box-shadow:0 0 0 0 rgba(248,113,113,.45)}\n    100%{box-shadow:0 0 0 10px rgba(248,113,113,0)}\n  }\n  .node.alert .dot{animation:pulseDot 1.8s ease-out infinite}\n\n  /* ============== ISOMETRIC SCENE ============== */\n  .iso-scene{position:absolute;inset:0;width:100%;height:100%;z-index:1}\n  .iso-scene .bldg{cursor:pointer;transition:filter .15s ease}\n  .iso-scene .bldg:hover{filter:brightness(1.06)}\n  /* Strong-contrast three-face shading (light / medium / dark) */\n  .iso-scene .face-top   { fill:#f4f6fa; stroke:#7d8593; stroke-width:1.3; stroke-linejoin:round }\n  .iso-scene .face-south { fill:#b6bcc8; stroke:#7d8593; stroke-width:1.3; stroke-linejoin:round }\n  .iso-scene .face-east  { fill:#878d99; stroke:#6b727f; stroke-width:1.3; stroke-linejoin:round }\n  /* Alert building — red across all faces + strong outline */\n  .iso-scene .bldg.alert .face-top   { fill:#fbd6d6; stroke:var(--alert); stroke-width:2 }\n  .iso-scene .bldg.alert .face-south { fill:#e08888; stroke:var(--alert); stroke-width:2 }\n  .iso-scene .bldg.alert .face-east  { fill:#a85c5c; stroke:#a32020; stroke-width:2 }\n  /* Warn building — amber */\n  .iso-scene .bldg.warn  .face-top   { fill:#f7e1a3; stroke:#b58a2a; stroke-width:1.6 }\n  .iso-scene .bldg.warn  .face-south { fill:#d6b25c; stroke:#b58a2a; stroke-width:1.6 }\n  .iso-scene .bldg.warn  .face-east  { fill:#a3853a; stroke:#9a7826; stroke-width:1.6 }\n  /* Window / floor grid (computed line ends, no transform) */\n  .iso-scene .grid{ stroke:rgba(0,0,0,.22); stroke-width:.9; fill:none; pointer-events:none }\n  .iso-scene .bldg.alert .grid { stroke:rgba(132,30,30,.45) }\n  .iso-scene .bldg.warn  .grid { stroke:rgba(110,80,12,.4) }\n  /* Ground shadow under each building */\n  .iso-scene .shadow{ fill:rgba(0,0,0,.18); pointer-events:none }\n  /* Outdoor camera marker */\n  .iso-scene .cam-bg{ fill:#0f172a; stroke:#ffffff; stroke-width:1.6 }\n  .iso-scene .cam-tip{ fill:#0f172a; stroke:#ffffff; stroke-width:1.4 }\n  .iso-scene .cam-label{ font-family:'JetBrains Mono',ui-monospace,monospace; font-size:9px; fill:#1e2433; font-weight:600 }\n\n  [data-theme=\"dark\"] .iso-scene .face-top   { fill:#2a3142; stroke:#4c5468 }\n  [data-theme=\"dark\"] .iso-scene .face-south { fill:#1c2231; stroke:#4c5468 }\n  [data-theme=\"dark\"] .iso-scene .face-east  { fill:#131826; stroke:#3a4258 }\n  [data-theme=\"dark\"] .iso-scene .bldg.alert .face-top   { fill:#552a2a }\n  [data-theme=\"dark\"] .iso-scene .bldg.alert .face-south { fill:#3c1c1c }\n  [data-theme=\"dark\"] .iso-scene .bldg.alert .face-east  { fill:#2a1212 }\n  [data-theme=\"dark\"] .iso-scene .bldg.warn  .face-top   { fill:#544017 }\n  [data-theme=\"dark\"] .iso-scene .bldg.warn  .face-south { fill:#3a2c10 }\n  [data-theme=\"dark\"] .iso-scene .bldg.warn  .face-east  { fill:#291f08 }\n  [data-theme=\"dark\"] .iso-scene .grid{ stroke:rgba(255,255,255,.10) }\n  [data-theme=\"dark\"] .iso-scene .shadow{ fill:rgba(0,0,0,.45) }\n  [data-theme=\"dark\"] .iso-scene .cam-bg{ fill:#ffffff; stroke:#0b0e16 }\n  [data-theme=\"dark\"] .iso-scene .cam-tip{ fill:#ffffff; stroke:#0b0e16 }\n  [data-theme=\"dark\"] .iso-scene .cam-label{ fill:var(--ink-3) }\n\n  /* ============== FLOOR CARDS (Building Detail) ============== */\n  .floor-card{\n    position:absolute;transform:translate(-50%,-50%);\n    background:var(--surface);\n    border:1px solid var(--border);\n    border-radius:8px;\n    padding:7px 12px 7px 14px;\n    min-width:300px;\n    display:flex;align-items:center;gap:10px;\n    z-index:3;cursor:pointer;user-select:none;\n    box-shadow:var(--shadow-2);\n    transition:transform .12s ease, box-shadow .12s ease, border-color .12s ease;\n    font-size:12.5px;\n  }\n  :root[data-theme=\"light\"] .floor-card{ border-color:#d4d7dc }\n  .floor-card:hover{transform:translate(-50%,-50%) translateY(-1px);box-shadow:var(--shadow-3);border-color:var(--border-2)}\n  .floor-card .dot{width:9px;height:9px;border-radius:50%;flex:none;box-shadow:0 0 0 3px var(--ring-soft)}\n  .floor-card .num{font-family:'JetBrains Mono',ui-monospace,monospace;font-weight:700;color:var(--ink);font-size:11.5px;\n    background:var(--surface-2);padding:2px 7px;border-radius:5px;letter-spacing:.02em}\n  .floor-card .label{color:var(--ink);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n  .floor-card .count{margin-left:auto;font-size:11px;color:var(--ink-2);font-family:'JetBrains Mono',ui-monospace,monospace;\n    background:var(--surface-2);padding:2px 8px;border-radius:999px;flex:none}\n  /* status accents */\n  .floor-card.alert{border-color:#fecaca}\n  .floor-card.warn { border-color:#fde2a3 }\n  .floor-card.alert::before,\n  .floor-card.warn::before,\n  .floor-card.ok::before{\n    content:\"\";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;\n  }\n  .floor-card.alert::before{background:var(--alert)}\n  .floor-card.warn::before {background:var(--warn)}\n  .floor-card.ok::before   {background:var(--ok)}\n  /* alert num colored */\n  .floor-card.alert .num{color:var(--alert);background:rgba(248,113,113,.12)}\n  .floor-card.warn  .num{color:#b58a2a;background:rgba(214,179,93,.18)}\n  [data-theme=\"dark\"] .floor-card.warn .num{color:#fbbf24;background:rgba(251,191,36,.14)}\n  /* guest / locked variant */\n  .floor-card.locked{cursor:not-allowed;opacity:.55}\n  .floor-card.locked .lock{margin-left:6px;color:var(--ink-3)}\n\n  /* leader line from building to card */\n  .iso-scene .leader{ stroke:#9099a8; stroke-width:1; stroke-dasharray:3 3; fill:none; opacity:.7 }\n  [data-theme=\"dark\"] .iso-scene .leader{ stroke:#4c5468 }\n\n  /* floor slabs use the same iso face classes; alert/warn override applies */\n  .iso-scene .bldg.alert .grid{ stroke:rgba(150,30,30,.4) }\n  .iso-scene .floor-divider{ stroke:rgba(0,0,0,.18); stroke-width:1.1; fill:none }\n  [data-theme=\"dark\"] .iso-scene .floor-divider{ stroke:rgba(255,255,255,.10) }\n\n  /* ============== FLOOR PLAN (2D) ============== */\n  .plan{position:absolute;inset:0;width:100%;height:100%;z-index:1}\n  .plan .floor-bg{ fill:#fbfbfb; stroke:#2a3038; stroke-width:5; stroke-linejoin:miter }\n  .plan .wall{ stroke:#2a3038; stroke-width:5; stroke-linecap:butt; fill:none }\n  .plan .door{ stroke:#fbfbfb; stroke-width:6 } /* paints a gap over a wall */\n  .plan .door-swing{ stroke:#9099a8; stroke-width:1; stroke-dasharray:3 3; fill:none }\n  .plan .room-label{\n    font-family:'Inter',sans-serif; font-size:11px; font-weight:600;\n    fill:#5b6470; letter-spacing:.08em; text-transform:uppercase; text-anchor:middle;\n    pointer-events:none;\n  }\n  .plan .room-sub{\n    font-family:'JetBrains Mono',ui-monospace,monospace; font-size:9.5px;\n    fill:#8a93a0; text-anchor:middle; pointer-events:none;\n  }\n  .plan .room-fill{ fill:rgba(15,23,42,.015) }\n  .plan .room-fill.alt{ fill:rgba(15,23,42,.035) }\n\n  [data-theme=\"dark\"] .plan .floor-bg{ fill:#0f1421; stroke:#4c5468 }\n  [data-theme=\"dark\"] .plan .wall{ stroke:#4c5468 }\n  [data-theme=\"dark\"] .plan .door{ stroke:#0f1421 }\n  [data-theme=\"dark\"] .plan .door-swing{ stroke:#3a4258 }\n  [data-theme=\"dark\"] .plan .room-label{ fill:var(--ink-2) }\n  [data-theme=\"dark\"] .plan .room-sub{ fill:var(--ink-3) }\n  [data-theme=\"dark\"] .plan .room-fill{ fill:rgba(255,255,255,.018) }\n  [data-theme=\"dark\"] .plan .room-fill.alt{ fill:rgba(255,255,255,.035) }\n\n  /* Camera icon (placed absolutely as inline elements over the canvas) */\n  .cam{\n    position:absolute; transform:translate(-50%,-50%);\n    z-index:3; user-select:none;\n    display:flex; flex-direction:column; align-items:center; gap:4px;\n    cursor:pointer; transition:transform .12s ease;\n  }\n  .cam:hover{ transform:translate(-50%,-50%) scale(1.05) }\n  .cam .icon{\n    width:30px; height:30px; border-radius:50%;\n    background:var(--surface); border:2px solid var(--ok);\n    display:grid; place-items:center; color:var(--ok);\n    box-shadow:0 2px 6px rgba(0,0,0,.18);\n    position:relative;\n  }\n  .cam .icon svg{ width:16px; height:16px }\n  .cam.alert .icon{ border-color:var(--alert); color:var(--alert) }\n  /* Status dot in bottom-right corner of icon */\n  .cam .icon::after{\n    content:\"\"; position:absolute; right:-1px; bottom:-1px;\n    width:9px; height:9px; border-radius:50%;\n    background:var(--ok); border:2px solid var(--surface);\n  }\n  .cam.alert .icon::after{ background:var(--alert) }\n  /* FOV cone — small wedge behind the icon, hinting at coverage */\n  .cam .fov{\n    position:absolute; left:50%; top:50%;\n    width:64px; height:64px; transform:translate(-50%,-50%) rotate(var(--rot, 0deg));\n    background:conic-gradient(from -25deg, rgba(34,197,94,.18) 0deg, rgba(34,197,94,.18) 50deg, transparent 50deg);\n    border-radius:50%;\n    z-index:-1; pointer-events:none;\n  }\n  .cam.alert .fov{\n    background:conic-gradient(from -25deg, rgba(248,113,113,.20) 0deg, rgba(248,113,113,.20) 50deg, transparent 50deg);\n  }\n  .cam .name{\n    background:var(--surface); border:1px solid var(--border);\n    border-radius:5px; padding:2px 7px;\n    font-family:'JetBrains Mono',ui-monospace,monospace; font-size:10px;\n    color:var(--ink-2); font-weight:600; letter-spacing:.02em;\n    box-shadow:0 1px 2px rgba(0,0,0,.06);\n    white-space:nowrap;\n  }\n  .cam.alert .name{ color:var(--alert); border-color:#fecaca }\n\n  /* Edit-mode treatments */\n  .canvas.edit .cam{ cursor:move }\n  .canvas.edit .cam .icon{\n    box-shadow:0 0 0 3px rgba(91,141,239,.22), 0 2px 6px rgba(0,0,0,.18);\n  }\n  .canvas.edit .cam::before{\n    content:\"\"; position:absolute; left:50%; top:50%;\n    width:48px; height:48px; transform:translate(-50%,-50%);\n    border:1.5px dashed var(--accent); border-radius:8px;\n    pointer-events:none;\n  }\n\n  /* Mode toggle (View / Edit) — segmented pill */\n  .mode-toggle{\n    position:absolute; top:14px; left:14px; z-index:4;\n    display:flex; background:var(--surface); border:1px solid var(--border);\n    border-radius:8px; padding:3px; font-size:12px; box-shadow:var(--shadow-1);\n  }\n  .mode-toggle button{\n    flex:none; padding:6px 14px; border-radius:6px; color:var(--ink-2); font-weight:500;\n    display:flex; align-items:center; gap:6px;\n  }\n  .mode-toggle button:hover{ color:var(--ink) }\n  .mode-toggle button.on{ background:var(--ink); color:var(--surface); font-weight:600 }\n  [data-theme=\"dark\"] .mode-toggle button.on{ background:var(--accent); color:#0b0e16 }\n\n  /* Edit-mode banner & \"+ Add Camera\" floating button */\n  .edit-banner{\n    position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:4;\n    display:none; align-items:center; gap:10px;\n    background:var(--accent-soft); border:1px solid rgba(91,141,239,.35);\n    border-radius:999px; padding:5px 14px 5px 8px;\n    font-size:12px; color:var(--accent-2); font-weight:600;\n  }\n  .edit-banner .dot{ width:8px; height:8px; border-radius:50%; background:var(--accent) }\n  .canvas.edit .edit-banner{ display:inline-flex }\n\n  .add-cam-btn{\n    position:absolute; bottom:14px; left:14px; z-index:4;\n    display:none; align-items:center; gap:8px;\n    background:var(--accent); color:#fff; border-radius:8px;\n    padding:9px 14px; font-size:12.5px; font-weight:600;\n    box-shadow:0 6px 18px rgba(91,141,239,.35);\n    cursor:pointer;\n  }\n  .add-cam-btn:hover{ background:var(--accent-2) }\n  [data-theme=\"dark\"] .add-cam-btn{ color:#0b0e16 }\n  .canvas.edit .add-cam-btn{ display:inline-flex }\n\n  /* Mode-mode role badge (showing current role's permissions) */\n  .role-hint{\n    position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:4;\n    display:none; align-items:center; gap:8px;\n    background:var(--surface); border:1px solid var(--border);\n    border-radius:999px; padding:5px 12px;\n    font-size:11px; color:var(--ink-3); font-weight:500;\n    box-shadow:var(--shadow-1);\n  }\n  .canvas.edit .role-hint{ display:inline-flex }\n\n  /* ============== RACK DETAIL ============== */\n  .rack-wrap{\n    position:absolute; inset:0; display:flex; gap:24px; padding:20px 24px;\n    align-items:stretch; z-index:1;\n  }\n  .rack{\n    width:340px; flex:none;\n    background:linear-gradient(180deg,#3a3f48 0%, #2e3239 100%);\n    border:6px solid #1f2226; border-radius:8px;\n    padding:8px;\n    display:flex; flex-direction:column;\n    box-shadow:0 8px 28px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.04);\n  }\n  .rack-header{\n    display:flex; align-items:center; justify-content:space-between;\n    padding:4px 6px 8px; color:#e6e8ec;\n  }\n  .rack-header .rid{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;font-weight:700;letter-spacing:.06em}\n  .rack-header .rsub{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:9.5px;color:#8a93a0}\n  .rack-body{\n    flex:1; display:flex; background:#1c1f24;\n    border:1px solid #15171b; border-radius:4px; overflow:hidden;\n    box-shadow:inset 0 0 0 1px rgba(0,0,0,.5);\n  }\n  .u-labels{\n    width:30px; display:flex; flex-direction:column;\n    background:#23262c; color:#8a93a0;\n    font-family:'JetBrains Mono',ui-monospace,monospace; font-size:8.5px;\n    border-right:1px solid #15171b;\n  }\n  .u-labels > div{\n    flex:1; min-height:0;\n    display:flex; align-items:center; justify-content:flex-end;\n    padding-right:5px; line-height:1; letter-spacing:.04em;\n  }\n  .u-labels > div.even{background:rgba(255,255,255,.03)}\n  .u-slots{\n    flex:1; position:relative; background:#1c1f24;\n    background-image:linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px);\n    background-size:100% calc(100% / 42);\n    background-position:0 -1px;\n  }\n  .u-slots .slot{\n    position:absolute; left:0; right:0; height:calc(100% / 42);\n    border-bottom:1px solid rgba(255,255,255,.04);\n    display:flex; align-items:center; justify-content:center;\n    color:rgba(255,255,255,.18); font-family:'JetBrains Mono',monospace; font-size:8px;\n    transition:background .15s ease;\n  }\n  .u-slots .slot:hover{ background:rgba(91,141,239,.10); color:rgba(255,255,255,.6) }\n  .u-slots .slot:hover::after{ content:\"+  add device\" }\n\n  /* Device blocks layered on top of slots */\n  .device{\n    position:absolute; left:3px; right:3px;\n    border-radius:3px; padding:0 6px;\n    display:flex; align-items:center; gap:7px;\n    background:linear-gradient(180deg,#454a55,#3a3f48);\n    color:#e6e8ec; font-family:'JetBrains Mono',ui-monospace,monospace;\n    font-size:10px; font-weight:600;\n    border-left:3px solid var(--ok);\n    box-shadow:0 1px 0 rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);\n    cursor:pointer; overflow:hidden;\n    transition:filter .12s ease, transform .12s ease;\n  }\n  .device:hover{ filter:brightness(1.12) }\n  .device .glyph{ width:14px;height:14px;flex:none;display:grid;place-items:center;color:#9aa3b2 }\n  .device .glyph svg{ width:14px;height:14px }\n  .device .name{ overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.02em }\n  .device .size{\n    margin-left:auto; font-size:9px; font-weight:500;\n    background:rgba(255,255,255,.08); padding:1px 5px; border-radius:3px; color:#9aa3b2;\n    flex:none;\n  }\n  .device .dot{ width:7px;height:7px;border-radius:50%;flex:none;background:var(--ok);\n    box-shadow:0 0 0 2px rgba(0,0,0,.35) }\n\n  .device.alert{\n    border-left-color:var(--alert);\n    background:linear-gradient(180deg,#5a2e30, #43232a);\n    color:#ffd6d6;\n  }\n  .device.alert .glyph{ color:#ffb3b3 }\n  .device.alert .dot{ background:var(--alert) }\n  .device.warn{\n    border-left-color:var(--warn);\n    background:linear-gradient(180deg,#5a4920, #443618);\n    color:#ffe9b6;\n  }\n  .device.warn .glyph{ color:#ffd07a }\n  .device.warn .dot{ background:var(--warn) }\n  .device.passive{\n    border-left-color:#6b7280;\n    background:linear-gradient(180deg,#2e3239,#26292f);\n    color:#8a93a0;\n  }\n  .device.passive .dot{ background:#6b7280 }\n\n  /* Sub-slot row (1U split into 2 or 3) */\n  .device-row{\n    position:absolute; left:3px; right:3px;\n    display:flex; gap:3px;\n  }\n  .sub-device{\n    flex:1; min-width:0;\n    background:linear-gradient(180deg,#454a55,#3a3f48);\n    border-left:2px solid var(--ok); border-radius:2px;\n    padding:0 5px;\n    display:flex; align-items:center; gap:4px;\n    color:#e6e8ec; font-family:'JetBrains Mono',ui-monospace,monospace; font-size:9px; font-weight:600;\n    box-shadow:0 1px 0 rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.05);\n    cursor:pointer; overflow:hidden;\n  }\n  .sub-device:hover{ filter:brightness(1.12) }\n  .sub-device .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}\n  .sub-device .dot{width:6px;height:6px;border-radius:50%;flex:none;background:var(--ok);margin-left:auto}\n  .sub-device.alert{ border-left-color:var(--alert);color:#ffd6d6 }\n  .sub-device.alert .dot{ background:var(--alert) }\n  .sub-device.warn{ border-left-color:var(--warn);color:#ffe9b6 }\n  .sub-device.warn .dot{ background:var(--warn) }\n\n  .rack-footer{\n    display:flex;align-items:center;gap:12px;\n    padding:8px 6px 2px; color:#8a93a0;\n    font-family:'JetBrains Mono',ui-monospace,monospace; font-size:10px;\n  }\n  .rack-footer .pill{\n    background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.08);\n    padding:2px 8px; border-radius:999px; font-size:9.5px; color:#cbd2db;\n  }\n\n  /* ============== INFO PANEL (right of rack) ============== */\n  .rack-info{ flex:1; min-width:0; display:flex; flex-direction:column; gap:14px; max-width:520px }\n  .info-row{ display:flex; gap:14px }\n  .info-card{\n    background:var(--surface); border:1px solid var(--border); border-radius:10px;\n    padding:14px 16px; box-shadow:var(--shadow-1);\n    flex:1; min-width:0;\n  }\n  .info-card .info-label{\n    text-transform:uppercase; letter-spacing:.1em; font-size:10px; font-weight:600;\n    color:var(--ink-3);\n  }\n  .info-card .info-big{\n    font-size:24px; font-weight:600; letter-spacing:-.02em; color:var(--ink);\n    margin-top:4px;\n  }\n  .info-card .info-big .info-unit{ font-size:13px;color:var(--ink-3);font-weight:500;margin-left:6px }\n  .info-card .info-bar{\n    margin-top:10px; height:6px; background:var(--surface-2); border-radius:999px; overflow:hidden;\n  }\n  .info-card .info-bar > span{ display:block;height:100%;background:var(--accent);border-radius:999px }\n  .info-card .info-bar.warn > span{ background:var(--warn) }\n  .info-card .info-foot{\n    margin-top:8px; color:var(--ink-3); font-size:11.5px;\n    font-family:'JetBrains Mono',ui-monospace,monospace;\n  }\n  .alerts-card .alert-list{ list-style:none;margin:8px 0 0;padding:0;display:flex;flex-direction:column;gap:8px }\n  .alerts-card .alert-list li{\n    display:flex; align-items:center; gap:10px; font-size:12.5px; color:var(--ink-2);\n    padding:6px 0; border-top:1px solid var(--border);\n  }\n  .alerts-card .alert-list li:first-child{ border-top:0 }\n  .alerts-card .alert-list .dot{ width:8px;height:8px;border-radius:50%;flex:none }\n  .alerts-card .alert-list .ago{ margin-left:auto;color:var(--ink-3);font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px }\n  .alerts-card .alert-list .dev{ font-family:'JetBrains Mono',ui-monospace,monospace; font-weight:600; color:var(--ink) }\n  .alerts-card .alert-list .what{ color:var(--ink-3) }\n\n  /* Device inventory table */\n  .inv-card{ flex:1 }\n  .inv-table{ width:100%; border-collapse:collapse; font-size:12px }\n  .inv-table th{\n    text-align:left; font-weight:600; color:var(--ink-3);\n    font-size:10px; text-transform:uppercase; letter-spacing:.08em;\n    padding:6px 8px 6px 0; border-bottom:1px solid var(--border);\n  }\n  .inv-table td{\n    padding:7px 8px 7px 0; border-bottom:1px solid var(--border);\n    color:var(--ink-2); font-size:12.5px;\n  }\n  .inv-table tr:last-child td{ border-bottom:0 }\n  .inv-table .dot{ width:7px;height:7px;border-radius:50%;display:inline-block;background:var(--ok);margin-right:8px;vertical-align:middle }\n  .inv-table .dot.r{ background:var(--alert) } .inv-table .dot.y{ background:var(--warn) } .inv-table .dot.gray{ background:#9099a8 }\n  .inv-table .u{ font-family:'JetBrains Mono',ui-monospace,monospace; color:var(--ink-3); font-size:11px; width:60px }\n  .inv-table .nm{ color:var(--ink); font-weight:600; font-family:'JetBrains Mono',ui-monospace,monospace; font-size:11.5px }\n  .inv-table .type{ color:var(--ink-3); font-size:11px; text-transform:uppercase; letter-spacing:.05em; width:80px }\n<\u002Fstyle>\n<\u002Fhead>\n<body style=\"background-color: rgb(237, 237, 237)\">\n<div class=\"app\" data-screen-label=\"08 Rack A1 — Server Room\">\n\n  <!-- ============== SIDEBAR ============== -->\n  <aside class=\"sidebar\">\n    <div class=\"brand\">\n      <div class=\"logo\">S<\u002Fdiv>\n      <div>\n        <div class=\"name\">SSM<\u002Fdiv>\n        <div class=\"ver mono\">v1.0 · Surveillance Smart-Monitor<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"nav-section\">\n      <div class=\"label\">Navigation<\u002Fdiv>\n      <div class=\"nav-item\">\n        <svg class=\"ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"2\"><\u002Fcircle><circle cx=\"5\" cy=\"5\" r=\"2\"><\u002Fcircle><circle cx=\"19\" cy=\"5\" r=\"2\"><\u002Fcircle><circle cx=\"5\" cy=\"19\" r=\"2\"><\u002Fcircle><circle cx=\"19\" cy=\"19\" r=\"2\"><\u002Fcircle><line x1=\"6.5\" y1=\"6.5\" x2=\"10.5\" y2=\"10.5\"><\u002Fline><line x1=\"17.5\" y1=\"6.5\" x2=\"13.5\" y2=\"10.5\"><\u002Fline><line x1=\"6.5\" y1=\"17.5\" x2=\"10.5\" y2=\"13.5\"><\u002Fline><line x1=\"17.5\" y1=\"17.5\" x2=\"13.5\" y2=\"13.5\"><\u002Fline><\u002Fsvg>\n        <span>Home — Topology<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"nav-item active\">\n        <svg class=\"ico\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><\u002Fsvg>\n        <span>Sites<\u002Fspan>\n        <span class=\"count\">4<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"nav-section\">\n      <div class=\"label\">Sites<\u002Fdiv>\n      <div class=\"tree\">\n        <div class=\"leaf active\">Site A — HQ Bangkok<span class=\"dot r\"><\u002Fspan><\u002Fdiv>\n        <div class=\"leaf\">Site B — Chiang Mai DC<span class=\"dot g\"><\u002Fspan><\u002Fdiv>\n        <div class=\"leaf\">Site C — Phuket Branch<span class=\"dot g\"><\u002Fspan><\u002Fdiv>\n        <div class=\"leaf\">Site D — Khon Kaen<span class=\"dot y\"><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"spacer\"><\u002Fdiv>\n\n    <div class=\"sidebar-foot\">\n      <div class=\"theme-toggle\" id=\"themeToggle\">\n        <button data-theme=\"light\" class=\"on\" aria-pressed=\"true\">\n          <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><line x1=\"12\" y1=\"2\" x2=\"12\" y2=\"4\"><\u002Fline><line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"2 n        <span class=\"sep\">/<\u002Fspan>\n        <span class=\"here\">Rack A1<\u002Fspan>\n      <\u002Fnav>\n      <div class=\"right\">\n        <span class=\"pill alert\"><span class=\"dot-i\"><\u002Fspan>1 site offline<\u002Fspan>\n        <span class=\"pill poll\"><span class=\"dot-i\"><\u002Fspan>Polling · 30s<\u002Fspan>\n        <button class=\"icon-btn\" title=\"Search\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\"><\u002Fline><\u002Fsvg>\n        <\u002Fbutton>\n        <button class=\"icon-btn\" title=\"Notifications\">\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.73 21a2 2 0 0 1-3.46 0\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- page header -->\n    <div class=\"page-head\">\n      <div>\n        <h1>Rack A1 — Server Room<\u002Fh1>\n        <div class=\"sub\">42U · up to 3 slots per U · 12 devices installed<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"legend\">\n        <span class=\"swatch\"><i style=\"background:var(--ok)\"><\u002Fi>Online<\u002Fspan>\n        <span class=\"swatch\"><i style=\"background:var(--warn)\"><\u002Fi>Warning<\u002Fspan>\n        <span class=\"swatch\"><i style=\"background:var(--alert)\"><\u002Fi>Offline<\u002Fspan>\n        <span class=\"swatch\"><i style=\"background:#9099a8\"><\u002Fi>Passive<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- canvas -->\n    <div class=\"canvas-wrap\">\n      <div class=\"canvas\" id=\"canvas\">\n\n        <!-- Rack diagram + info panel -->\n        <div class=\"rack-wrap\">\n          <!-- Rack frame -->\n          <div class=\"rack\">\n            <div class=\"rack-header\">\n              <span class=\"rid\">RACK A1<\u002Fspan>\n              <span class=\"rsub\">42U · 600 × 1000 mm<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"rack-body\">\n              <div class=\"u-labels\" id=\"uLabels\"><\u002Fdiv>\n              <div class=\"u-slots\" id=\"uSlots\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"rack-footer\">\n              <span class=\"pill\">14U used<\u002Fspan>\n              <span class=\"pill\">28U free<\u002Fspan>\n              <span class=\"pill\">12 devices<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Info panel on the right -->\n          <aside class=\"rack-info\">\n            <div class=\"info-row\">\n              <div class=\"info-card\">\n                <div class=\"info-label\">Capacity<\u002Fdiv>\n                <div class=\"info-big\">14<span class=\"info-unit\">/ 42 U<\u002Fspan><\u002Fdiv>\n                <div class=\"info-bar\"><span style=\"width:33.3%\"><\u002Fspan><\u002Fdiv>\n                <div class=\"info-foot\">28U free · 12 devices<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"info-card\">\n                <div class=\"info-label\">Power draw<\u002Fdiv>\n                <div class=\"info-big\">1.24<span class=\"info-unit\">kW<\u002Fspan><\u002Fdiv>\n                <div class=\"info-bar warn\"><span style=\"width:49%\"><\u002Fspan><\u002Fdiv>\n                <div class=\"info-foot\">Budget 2.5 kW · 49%<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <div class=\"info-card alerts-card\">\n              <div class=\"info-label\">Active alerts · 2<\u002Fdiv>\n              <ul class=\"alert-list\">\n                <li>\n                  <span class=\"dot\" style=\"background:var(--alert)\"><\u002Fspan>\n                  <span class=\"dev\">SW-HQ-FLOOR3<\u002Fspan>\n                  <span class=\"what\">· offline<\u002Fspan>\n                  <span class=\"ago\">8m ago<\u002Fspan>\n                <\u002Fli>\n                <li>\n                  <span class=\"dot\" style=\"background:var(--warn)\"><\u002Fspan>\n                  <span class=\"dev\">SW-HQ-FLOOR2<\u002Fspan>\n                  <span class=\"what\">· chassis temp 62°C<\u002Fspan>\n                  <span class=\"ago\">22m ago<\u002Fspan>\n                <\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n\n            <div class=\"info-card inv-card\">\n              <div class=\"info-label\">Inventory<\u002Fdiv>\n              <table class=\"inv-table\" style=\"margin-top:8px\">\n                <thead>\n                  <tr><th class=\"u\">Slot<\u002Fth><th>Device<\u002Fth><th class=\"type\">Type<\u002Fth><th>Status<\u002Fth><\u002Ftr>\n                <\u002Fthead>\n                <tbody id=\"invBody\"><\u002Ftbody>\n              <\u002Ftable>\n            <\u002Fdiv>\n          <\u002Faside>\n        <\u002Fdiv>\n\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fmain>\n<\u002Fdiv>\n<script>\n  // Theme toggle — persists choice in localStorage\n  (function(){\n    var root = document.documentElement;\n    var toggle = document.getElementById('themeToggle');\n    if(!toggle) return;\n    var saved = null;\n    try{ saved = localStorage.getItem('ssm.theme'); }catch(e){}\n    if(saved === 'light' || saved === 'dark') apply(saved);\n    toggle.addEventListener('click', function(e){\n      var btn = e.target.closest('button[data-theme]');\n      if(!btn) return;\n      apply(btn.dataset.theme);\n      try{ localStorage.setItem('ssm.theme', btn.dataset.theme); }catch(e){}\n    });\n    function apply(theme){\n      root.setAttribute('data-theme', theme);\n      toggle.querySelectorAll('button[data-theme]').forEach(function(b){\n        var on = b.dataset.theme === theme;\n        b.classList.toggle('on', on);\n        b.setAttribute('aria-pressed', on ? 'true' : 'false');\n      });\n    }\n  })();\n<\u002Fscript>\n<script>\n  // ============== RACK DETAIL — render slots + devices ==============\n  (function(){\n    var slots   = document.getElementById('uSlots');\n    var labels  = document.getElementById('uLabels');\n    var invBody = document.getElementById('invBody');\n    if(!slots || !labels) return;\n\n    // U numbers 42 (top) → 1 (bottom); alternate striping\n    for(var u = 42; u >= 1; u--){\n      var lab = document.createElement('div');\n      lab.textContent = (u < 10 ? '0' : '') + u;\n      if(u % 2 === 0) lab.className = 'even';\n      labels.appendChild(lab);\n\n      var s = document.createElement('div');\n      s.className = 'slot';\n      s.dataset.u = u;\n      s.style.top = ((42 - u) / 42 * 100) + '%';\n      slots.appendChild(s);\n    }\n\n    // Glyphs per device type\n    function glyph(type){\n      if(type === 'nvr')    return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"12\" rx=\"1\"/><line x1=\"6\" y1=\"10\" x2=\"6\" y2=\"14\"/><circle cx=\"11\" cy=\"12\" r=\"1\" fill=\"currentColor\"/><circle cx=\"14\" cy=\"12\" r=\"1\" fill=\"currentColor\"/><circle cx=\"17\" cy=\"12\" r=\"1\" fill=\"currentColor\"/><\u002Fsvg>';\n      if(type === 'switch') return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"8\" width=\"20\" height=\"8\" rx=\"1\"/><line x1=\"5\" y1=\"11\" x2=\"5\" y2=\"13\"/><line x1=\"8\" y1=\"11\" x2=\"8\" y2=\"13\"/><line x1=\"11\" y1=\"11\" x2=\"11\" y2=\"13\"/><line x1=\"14\" y1=\"11\" x2=\"14\" y2=\"13\"/><line x1=\"17\" y1=\"11\" x2=\"17\" y2=\"13\"/><line x1=\"20\" y1=\"11\" x2=\"20\" y2=\"13\"/><\u002Fsvg>';\n      if(type === 'patch')  return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"9\" width=\"20\" height=\"6\" rx=\"1\"/><line x1=\"5\" y1=\"10.5\" x2=\"5\" y2=\"13.5\"/><line x1=\"8\" y1=\"10.5\" x2=\"8\" y2=\"13.5\"/><line x1=\"11\" y1=\"10.5\" x2=\"11\" y2=\"13.5\"/><line x1=\"14\" y1=\"10.5\" x2=\"14\" y2=\"13.5\"/><line x1=\"17\" y1=\"10.5\" x2=\"17\" y2=\"13.5\"/><line x1=\"20\" y1=\"10.5\" x2=\"20\" y2=\"13.5\"/><\u002Fsvg>';\n      if(type === 'pdu')    return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"9\" width=\"20\" height=\"6\" rx=\"1\"/><circle cx=\"6\" cy=\"12\" r=\"1.2\"/><circle cx=\"10\" cy=\"12\" r=\"1.2\"/><circle cx=\"14\" cy=\"12\" r=\"1.2\"/><circle cx=\"18\" cy=\"12\" r=\"1.2\"/><\u002Fsvg>';\n      if(type === 'ups')    return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"1\"/><line x1=\"3\" y1=\"9\" x2=\"21\" y2=\"9\"/><polyline points=\"11 11 9 15 12 15 10 19\"/><\u002Fsvg>';\n      if(type === 'cable')  return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M4 10c4 0 4 4 8 4s4-4 8-4\"/><path d=\"M4 14c4 0 4-4 8-4s4 4 8 4\"/><\u002Fsvg>';\n      if(type === 'ap')     return '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12.55a11 11 0 0 1 14 0\"/><path d=\"M8.5 16.42a6 6 0 0 1 7 0\"/><circle cx=\"12\" cy=\"20\" r=\"1\" fill=\"currentColor\"/><\u002Fsvg>';\n      return '';\n    }\n\n    // Devices — top to bottom. u_top is the highest U the device occupies.\n    var devices = [\n      { u_top:42, size:2, name:'CABLE MGR',       type:'cable',  status:'passive' },\n      { u_top:39, size:2, name:'PDU-A · 12-out',  type:'pdu',    status:'passive' },\n      { u_top:37, size:2, name:'NVR-HQ-01',       type:'nvr',    status:'ok',\n        model:'Hikvision DS-7732NI' },\n      { u_top:34, size:1, name:'SW-HQ-CORE',      type:'switch', status:'ok',\n        model:'Cisco SG350X 24P' },\n      { u_top:33, size:1, name:'SW-HQ-FLOOR3',    type:'switch', status:'alert',\n        model:'Cisco CBS350 24P' },\n      { u_top:32, size:1, name:'SW-HQ-FLOOR2',    type:'switch', status:'warn',\n        model:'Cisco CBS350 24P' },\n      { u_top:31, size:2, name:'NVR-HQ-02',       type:'nvr',    status:'ok',\n        model:'Hikvision DS-7732NI' },\n      { u_top:28, size:1, name:'PATCH-A · 48p',   type:'patch',  status:'passive' },\n      // sub-slot rows\n      { u_top:27, size:1, subs:[\n          { name:'AP-301', type:'ap', status:'ok' },\n          { name:'AP-302', type:'ap', status:'ok' },\n          { name:'AP-303', type:'ap', status:'ok' }\n        ] },\n      { u_top:26, size:1, subs:[\n          { name:'SW-MINI-01', type:'switch', status:'ok' },\n          { name:'SW-MINI-02', type:'switch', status:'warn' }\n        ] },\n      { u_top:5,  size:4, name:'UPS · 3 kVA',      type:'ups',    status:'ok',\n        model:'APC SRT3000RMXLI' }\n    ];\n\n    devices.forEach(function(d){\n      var topPct    = ((42 - d.u_top) / 42) * 100;\n      var heightPct = (d.size / 42) * 100;\n\n      if(d.subs){\n        var row = document.createElement('div');\n        row.className = 'device-row';\n        row.style.top = topPct + '%';\n        row.style.height = heightPct + '%';\n        d.subs.forEach(function(s){\n          var sd = document.createElement('div');\n          sd.className = 'sub-device ' + s.status;\n          sd.innerHTML =\n            '<span class=\"glyph\">' + glyph(s.type) + '<\u002Fspan>' +\n            '<span class=\"name\">' + s.name + '<\u002Fspan>' +\n            '<span class=\"dot\"><\u002Fspan>';\n          row.appendChild(sd);\n        });\n        // If subs is less than 3, append a placeholder empty sub-slot so the row reads as a 3-slot tray\n        if(d.subs.length < 3){\n          var empty = document.createElement('div');\n          empty.className = 'sub-device';\n          empty.style.opacity = '.35';\n          empty.style.borderLeftColor = 'transparent';\n          empty.innerHTML = '<span class=\"name\" style=\"color:#6b7280\">empty<\u002Fspan>';\n          row.appendChild(empty);\n        }\n        slots.appendChild(row);\n      } else {\n        var dv = document.createElement('div');\n        dv.className = 'device ' + d.status;\n        dv.style.top = topPct + '%';\n        dv.style.height = heightPct + '%';\n        dv.innerHTML =\n          '<span class=\"glyph\">' + glyph(d.type) + '<\u002Fspan>' +\n          '<span class=\"name\">' + d.name + '<\u002Fspan>' +\n          (d.size > 1 ? '<span class=\"size\">' + d.size + 'U<\u002Fspan>' : '') +\n          '<span class=\"dot\"><\u002Fspan>';\n        slots.appendChild(dv);\n      }\n    });\n\n    // Inventory table (right panel)\n    function uRange(d){\n      var lo = d.u_top - d.size + 1;\n      return d.size > 1 ? ('U' + lo + '–U' + d.u_top) : ('U' + d.u_top);\n    }\n    function statusDot(s){\n      var cls = s === 'alert' ? 'r' : s === 'warn' ? 'y' : s === 'passive' ? 'gray' : '';\n      var label = s === 'alert' ? 'Offline' : s === 'warn' ? 'Warning' : s === 'passive' ? 'Passive' : 'Online';\n      return '<span class=\"dot ' + cls + '\"><\u002Fspan>' + label;\n    }\n    devices.forEach(function(d){\n      if(d.subs){\n        d.subs.forEach(function(s){\n          var tr = document.createElement('tr');\n          tr.innerHTML =\n            '<td class=\"u\">U' + d.u_top + '<\u002Ftd>' +\n            '<td><span class=\"nm\">' + s.name + '<\u002Fspan><\u002Ftd>' +\n            '<td class=\"type\">' + (s.type || '—') + '<\u002Ftd>' +\n            '<td>' + statusDot(s.status) + '<\u002Ftd>';\n          invBody.appendChild(tr);\n        });\n      } else {\n        var tr = document.createElement('tr');\n        tr.innerHTML =\n          '<td class=\"u\">' + uRange(d) + '<\u002Ftd>' +\n          '<td><span class=\"nm\">' + d.name + '<\u002Fspan><\u002Ftd>' +\n          '<td class=\"type\">' + (d.type || '—') + '<\u002Ftd>' +\n          '<td>' + statusDot(d.status) + '<\u002Ftd>';\n        invBody.appendChild(tr);\n      }\n    });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
