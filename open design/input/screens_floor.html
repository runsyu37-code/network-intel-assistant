<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../mpmh6zea-tokens.css">
    <link rel="stylesheet" href="../mpmh6ze9-layout.css">
    <style>
        body { margin: 0; padding: 0; background: transparent; font-family: 'Inter', sans-serif; }

        .floor-wrap {
            display: flex;
            height: calc(100vh - 64px);
            gap: 0;
        }

        /* Main canvas */
        .floor-canvas-area {
            flex: 1;
            position: relative;
            background: var(--canvas-bg);
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 40px 40px;
            overflow: hidden;
        }

        /* Floor SVG outline */
        .floor-svg {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* Camera markers */
        .cam-marker {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
        }
        .cam-marker-circle {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--surface);
            border: 2px solid var(--ok);
            display: grid; place-items: center;
            box-shadow: var(--shadow-2);
            color: var(--ok);
            transition: transform 0.15s;
        }
        .cam-marker-circle:hover { transform: scale(1.2); }
        .cam-marker-circle.offline { border-color: var(--alert); color: var(--alert); }
        .cam-marker-circle.warn    { border-color: var(--warn);  color: var(--warn); }

        /* Tooltip card */
        .cam-tooltip {
            position: absolute;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            min-width: 160px;
            box-shadow: var(--shadow-3);
            z-index: 10;
            pointer-events: none;
        }
        .cam-tooltip-name { font-weight: 600; font-size: 12.5px; color: var(--ink); margin-bottom: 4px; }
        .cam-tooltip-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--ink-3); margin-top: 2px; }
        .cam-tooltip-row span:last-child { font-family: 'JetBrains Mono', monospace; color: var(--ink-2); }
        .cam-tooltip-status {
            display: inline-flex; align-items: center; gap: 4px;
            font-size: 11px; font-weight: 600; margin-top: 6px;
        }
        .cam-tooltip-status.ok    { color: var(--ok); }
        .cam-tooltip-status.alert { color: var(--alert); }

        /* Mode toggle */
        .mode-toggle {
            display: flex; gap: 2px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 7px; padding: 3px;
        }
        .mode-btn {
            padding: 5px 14px;
            border-radius: 5px;
            font-size: 12px; font-weight: 600;
            color: var(--ink-2); cursor: pointer;
            border: none; background: none;
        }
        .mode-btn.active {
            background: var(--surface);
            color: var(--ink);
            box-shadow: var(--shadow-1);
        }

        /* Edit sidebar */
        .floor-sidebar {
            width: 240px;
            flex: none;
            border-left: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
        }
        .sidebar-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: .06em;
            color: var(--ink-3);
        }
        .sidebar-item {
            display: flex; align-items: center; gap: 10px;
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 12px; cursor: grab;
        }
        .sidebar-item:hover { background: var(--surface-2); }
        .drag-handle { color: var(--ink-4); flex: none; cursor: grab; }
        .sidebar-cam-name { font-weight: 500; color: var(--ink); flex: 1; }
        .sidebar-cam-ip { font-size: 10.5px; font-family: 'JetBrains Mono', monospace; color: var(--ink-3); }
        .sidebar-dot { width: 6px; height: 6px; border-radius: 50%; flex: none; }
    </style>
</head>
<body>
    <div class="page-head">
        <div>
            <h1>Floor 3 — Building A</h1>
            <div class="page-sub">HQ Bangkok · 9 cameras · 8 online, 1 warning</div>
        </div>
        <div class="topbar-right">
            <div class="mode-toggle">
                <button class="mode-btn">View</button>
                <button class="mode-btn active">Edit</button>
            </div>
        </div>
    </div>

    <div class="floor-wrap">
        <!-- Canvas -->
        <div class="floor-canvas-area">

            </svg>

            <!-- Camera markers (positioned absolutely over canvas) -->
            <div class="cam-marker" style="left: 22%; top: 28%;">
                <div class="cam-marker-circle">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>

            <div class="cam-marker" style="left: 22%; top: 72%;">

                </div>
            </div>
            <div class="cam-marker" style="left: 52%; top: 28%;">
                <div class="cam-marker-circle">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                </div>
            </div>
            <div class="cam-marker" style="left: 78%; top: 28%;">
                <div class="cam-marker-circle">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                </div>
            </div>

            <!-- Warning marker -->
            <div class="cam-marker" style="left: 52%; top: 72%;">
                <div class="cam-marker-circle warn">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                </div>
            </div>

            <!-- Offline marker -->
            <div class="cam-marker" style="left: 78%; top: 72%;">
                <div class="cam-marker-circle offline">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>
                </div>
            </div>

            <!-- Active tooltip for Office 3A cam -->
            <div class="cam-tooltip" style="left: 24%; top: 18%;">
                <div class="cam-tooltip-name">Office 3A</div>
                <div class="cam-tooltip-row"><span>IP</span><span>192.168.1.105</span></div>
                <div class="cam-tooltip-row"><span>ID</span><span>CAM-005</span></div>
                <div class="cam-tooltip-status ok">
                    <span style="width:6px;height:6px;border-radius:50%;background:currentColor;display:inline-block;"></span>
                    Online
                </div>
            </div>
        </div>

        <!-- Edit sidebar -->
        <div class="floor-sidebar">
            <div class="sidebar-head">Cameras on this floor</div>
            <div class="sidebar-item">
                <span class="drag-handle">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="6" r="1.5" fill="currentColor"/><circle cx="16" cy="6" r="1.5" fill="currentColor"/><circle cx="8" cy="12" r="1.5" fill="currentColor"/><circle cx="16" cy="12" r="1.5" fill="currentColor"/><circle cx="8" cy="18" r="1.5" fill="currentColor"/><circle cx="16" cy="18" r="1.5" fill="currentColor"/></svg>
                </span>
                <span class="sidebar-dot" style="background: var(--ok);"></span>
                <div>
                    <div class="sidebar-cam-name">Office 3A</div>
                    <div class="sidebar-cam-ip">192.168.1.105</div>
                </div>
            </div>
            <div class="sidebar-item">
                <span class="drag-handle">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="6" r="1.5" fill="currentColor"/><circle cx="16" cy="6" r="1.5" fill="currentColor"/><circle cx="8" cy="12" r="1.5" fill="currentColor"/><circle cx="16" cy="12" r="1.5" fill="currentColor"/><circle cx="8" cy="18" r="1.5" fill="currentColor"/><circle cx="16" cy="18" r="1.5" fill="currentColor"/></svg>
                </span>
                <span class="sidebar-dot" style="background: var(--ok);"></span>
                <div>
                    <div class="sidebar-cam-name">Office 3B</div>
                    <div class="sidebar-cam-ip">192.168.1.106</div>
                </div>
            </div>
            <div class="sidebar-item">
                <span class="drag-handle">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="6" r="1.5" fill="currentColor"/><circle cx="16" cy="6" r="1.5" fill="currentColor"/><circle cx="8" cy="12" r="1.5" fill="currentColor"/><circle cx="16" cy="12" r="1.5" fill="currentColor"/><circle cx="8" cy="18" r="1.5" fill="currentColor"/><circle cx="16" cy="18" r="1.5" fill="currentColor"/></svg>

                    <div class="sidebar-cam-name">Office 3C</div>

                </div>
            </div>
            <div class="sidebar-item">
                <span class="drag-handle">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="6" r="1.5" fill="currentColor"/><circle cx="16" cy="6" r="1.5" fill="currentColor"/><circle cx="8" cy="12" r="1.5" fill="currentColor"/><circle cx="16" cy="12" r="1.5" fill="currentColor"/><circle cx="8" cy="18" r="1.5" fill="currentColor"/><circle cx="16" cy="18" r="1.5" fill="currentColor"/></svg>
                </span>
                <span class="sidebar-dot" style="background: var(--warn);"></span>
                <div>
                    <div class="sidebar-cam-name">Meeting Room 301</div>
                    <div class="sidebar-cam-ip">192.168.1.109</div>
                </div>
            </div>
            <div class="sidebar-item">
                <span class="drag-handle">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="8" cy="6" r="1.5" fill="currentColor"/><circle cx="16" cy="6" r="1.5" fill="currentColor"/><circle cx="8" cy="12" r="1.5" fill="currentColor"/><circle cx="16" cy="12" r="1.5" fill="currentColor"/><circle cx="8" cy="18" r="1.5" fill="currentColor"/><circle cx="16" cy="18" r="1.5" fill="currentColor"/></svg>
                </span>
                <span class="sidebar-dot" style="background: var(--alert);"></span>
                <div>
                    <div class="sidebar-cam-name">Break Room 3</div>
                    <div class="sidebar-cam-ip">192.168.1.108</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
