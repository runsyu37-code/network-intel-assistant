<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <title>Users CRUD</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../mpmh6zea-tokens.css">
  <link rel="stylesheet" href="../mpmh6ze9-layout.css">
  <style>
    :root {
      --bg: #09090b; --surface: #18181b; --surface-2: #27272a; --border: #27272a;
      --ink-1: #fafafa; --ink-2: #a1a1aa; --ink-3: #71717a;
      --accent: #3b82f6; --accent-soft: rgba(59,130,246,0.1);
      --ok: #22c55e; --ok-soft: rgba(34,197,94,0.1);
      --warn: #f59e0b; --alert: #ef4444; --alert-soft: rgba(239,68,68,0.1);
      --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px; --radius-full: 9999px;
    }
    body { margin: 0; padding: 24px; background: var(--bg); color: var(--ink-1); font-family: 'Inter', sans-serif; position: relative; min-height: 100vh; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
    .page-title { font-size: 24px; margin: 0; }
    .btn { padding: 8px 16px; border-radius: var(--radius-md); font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
    .btn-primary { background: var(--accent); color: #fff; }
    
    table { width: 100%; border-collapse: collapse; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
    th, td { padding: 16px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { color: var(--ink-2); font-weight: 500; background: var(--surface-2); }
    .row-inactive { opacity: 0.6; }
    
    .role-badge { padding: 4px 10px; border-radius: var(--radius-full); font-size: 12px; font-weight: 500; display: inline-block; }
    .role-admin { background: var(--alert-soft); color: var(--alert); }
    .role-user { background: var(--accent-soft); color: var(--accent); }
    .role-viewer { background: var(--surface-2); color: var(--ink-3); }
    
    .status-badge { display: flex; align-items: center; gap: 6px; font-size: 13px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-active .status-dot { background: var(--ok); }
    .status-inactive .status-dot { background: var(--ink-3); }
    
    .actions { display: flex; gap: 8px; }
    .action-btn { width: 32px; height: 32px; background: transparent; border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--ink-2); display: flex; align-items: center; justify-content: center; cursor: pointer; }
    .action-btn:hover { background: var(--surface-2); color: var(--ink-1); }
    .action-btn.del:hover { color: var(--alert); background: var(--alert-soft); }
    
    /* Modal */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { width: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    .modal-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .modal-title { font-size: 18px; font-weight: 600; margin: 0; }
    .modal-close { background: none; border: none; color: var(--ink-2); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 8px; }
    .form-label { font-size: 14px; color: var(--ink-2); }
    .form-input { padding: 10px 12px; border-radius: var(--radius-md); border: 1px solid var(--border); background: var(--bg); color: var(--ink-1); font-family: 'Inter', sans-serif; font-size: 14px; width: 100%; box-sizing: border-box; }
    .form-input:focus { outline: none; border-color: var(--accent); }
    .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px; background: var(--surface-2); }
    .btn-secondary { background: transparent; border: 1px solid var(--border); color: var(--ink-1); }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="page-title">Users</h1>
    <button class="btn btn-primary">Add User</button>
  </div>
  
  <table>
    <thead>
      <tr>
        <th>Username</th>
        <th>Display Name</th>
        <th>Role</th>
        <th>Status</th>
        <th style="width: 120px;">Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td class="mono">admin_test</td>
        <td>System Admin</td>
        <td><span class="role-badge role-admin">Admin</span></td>
        <td><div class="status-badge status-active"><div class="status-dot"></div>Active</div></td>
        <td>
          <div class="actions">
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>
            <button class="action-btn del"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
          </div>
        </td>
      </tr>
      <tr>
        <td class="mono">ran_user</td>
        <td>Ran M.</td>
        <td><span class="role-badge role-user">User</span></td>
        <td><div class="status-badge status-active"><div class="status-dot"></div>Active</div></td>
        <td>
          <div class="actions">
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>
            <button class="action-btn del"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
          </div>
        </td>
      </tr>
      <tr>
        <td class="mono">viewer01</td>
        <td>Guest Viewer</td>
        <td><span class="role-badge role-viewer">Viewer</span></td>
        <td><div class="status-badge status-active"><div class="status-dot"></div>Active</div></td>
        <td>
          <div class="actions">
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>
            <button class="action-btn del"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
          </div>
        </td>
      </tr>
      <tr class="row-inactive">
        <td class="mono">old_staff</td>
        <td>Ex Employee</td>
        <td><span class="role-badge role-user">User</span></td>
        <td><div class="status-badge status-inactive"><div class="status-dot"></div>Inactive</div></td>
        <td>
          <div class="actions">
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>
            <button class="action-btn del"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
          </div>
        </td>
      </tr>
      <tr>
        <td class="mono">temp_access</td>
        <td>Contractor</td>
        <td><span class="role-badge role-viewer">Viewer</span></td>
        <td><div class="status-badge status-active"><div class="status-dot"></div>Active</div></td>
        <td>
          <div class="actions">
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg></button>
            <button class="action-btn"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg></button>
            <button class="action-btn del"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Edit User Modal -->
  <div class="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">Edit User</h2>
        <button class="modal-close">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" class="form-input mono" value="ran_user" disabled style="opacity: 0.6; cursor: not-allowed;">
        </div>
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input type="text" class="form-input" value="Ran M.">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" value="ran.m@example.com">
        </div>
        <div class="form-group">
          <label class="form-label">Role</label>
          <select class="form-input">
            <option>Admin</option>
            <option selected>User</option>
            <option>Viewer</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-input">
            <option selected>Active</option>
            <option>Inactive</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary">Cancel</button>
        <button class="btn btn-primary">Save Changes</button>
      </div>
    </div>
  </div>
</body>
</html>
