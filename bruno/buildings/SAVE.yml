info:
  name: SAVE
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:50680/api/buildings
  auth: inherit
  headers:
    - name: Authorization
      value: Bearer {{admin_token}}
      enabled: true
    - name: Content-Type
      value: application/json
      enabled: true
  body:
    mode: json
    json: |-
      [
        {
          "Building_ID": "B_T",
          "Site_ID": "S001",
          "name": "Test Building",
          "code": "TST-B",
          "floor_count": 1,
          "description": "Mock test record",
          "image_data": null,
          "image_type": null,
          "note": null
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
