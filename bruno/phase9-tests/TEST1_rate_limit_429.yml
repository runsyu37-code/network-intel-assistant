info:
  name: TEST1 - Rate limit triggers 429 after 10 fails
  type: http
  seq: 1

http:
  method: POST
  url: http://localhost:50680/api/auth/login
  headers:
    - name: Content-Type
      value: application/json
      enabled: true
  body:
    mode: json
    json: |-
      {
        "username": "admin",
        "password": "WRONG_PASSWORD"
      }

# SETUP: Run this request 10+ times manually (or use the PowerShell script below)
# PowerShell one-liner to trigger lockout:
#   1..11 | ForEach-Object { Invoke-RestMethod http://localhost:50680/api/auth/login -Method POST -ContentType application/json -Body '{"username":"admin","password":"WRONG"}' -ErrorAction SilentlyContinue }
#
# EXPECT first 10: 401 Unauthorized
# EXPECT 11th onwards: 429 Too Many Requests
# PASS if: status 429, body contains "Too many failed login attempts"
# FAIL if: status 401 on 11th attempt

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: false
  maxRedirects: 5
