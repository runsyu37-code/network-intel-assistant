info:
  name: SAVE
  type: http
  seq: 2

http:
  method: POST
  url: http://localhost:50680/api/users
  auth: inherit
  headers:
    - name: Content-Type
      value: application/json
      enabled: true
    - name: Authorization
      value: Bearer {{admin_token}}
      enabled: true
  body:
    mode: json
    json: |-
      [
        {
          "username": "test_user",
          "password": "Test@1234",
          "display_name": "Test User",
          "role": "viewer",
          "is_active": true
        }
      ]

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
