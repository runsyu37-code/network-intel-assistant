  body:
    mode: json
    json: |-
      {
        "username": "admin",
        "display_name": "Administrator (Updated)",
        "role": "admin",
        "is_active": true,
        "password": "NewPassword@1234"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
