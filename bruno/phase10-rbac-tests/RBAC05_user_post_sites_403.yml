info:
  name: RBAC05 - user POST /api/sites → 403 (write is admin-only)
  type: http
  seq: 5

http:
  method: POST
  url: http://localhost:50680/api/sites
  headers:
    - name: Authorization
      value: Bearer {{user_token}}
    - name: Content-Type
      value: application/json

runtime:
  variables:
    - name: user_token
      value: FILL_IN_TOKEN

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
