info:
  name: RBAC21 - Phase 13 reflection check (manual run)
  type: http
  seq: 21

# WHAT THIS TESTS:
#   Phase 13 security gate: all HTTP write endpoints have [RequireRole] or [AllowAnonymous].
#
# THIS IS NOT A BRUNO HTTP REQUEST.
# The actual check is a PowerShell reflection script.
#
# HOW TO RUN:
#   From the repo root (C:\ai-playground\API):
#   .\scripts\Check-EndpointSecurity.ps1
#
# EXPECTED OUTPUT:
#   43 PASS, 0 FAIL
#   Exit code 0
#
# WHEN TO RUN:
#   - After adding any new controller or action method
#   - Before any deployment
#   - After any refactor touching [RequireRole] attributes
#
# PASS: Exit 0, all 43 write endpoints listed as [PASS]
# FAIL: Exit 1, any endpoint listed as [FAIL] -> add [RequireRole(...)] to that method

http:
  method: GET
  url: http://localhost:50680/api/auth/me
  headers:
    - name: Authorization
      value: Bearer {{admin_token}}

# Note: The GET /api/auth/me above is a placeholder so Bruno shows this as
# a runnable entry. Run the PowerShell script for the actual Phase 13 gate.

runtime:
  variables:
    - name: admin_token
      value: FILL_IN_TOKEN

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
